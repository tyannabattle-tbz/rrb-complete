# Upstream servers
upstream qumus_core {
    server qumus-core:3000;
    keepalive 32;
}

upstream rrb_radio {
    server rrb-radio:3001;
    keepalive 32;
}

upstream hybridcast {
    server hybridcast:3002;
    keepalive 32;
}

# QUMUS Core - Port 80/443
server {
    listen 80;
    server_name qumus.local qumus localhost 127.0.0.1;
    
    location / {
        proxy_pass http://qumus_core;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://qumus_core/health;
        access_log off;
    }
}

# RRB Radio - Port 80/443
server {
    listen 80;
    server_name rrb.local rrb localhost:3001 127.0.0.1:3001;
    
    location / {
        proxy_pass http://rrb_radio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://rrb_radio/health;
        access_log off;
    }
}

# HybridCast Emergency Broadcast - Port 80/443
server {
    listen 80;
    server_name hybridcast.local hybridcast localhost:3002 127.0.0.1:3002;
    
    location / {
        proxy_pass http://hybridcast;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://hybridcast/health;
        access_log off;
    }
}

# Health check endpoint
server {
    listen 80;
    server_name health.local health localhost:8080 127.0.0.1:8080;
    
    location / {
        return 200 "QUMUS Ecosystem - All Systems Operational\n";
        add_header Content-Type text/plain;
    }

    location /qumus {
        proxy_pass http://qumus_core/health;
    }

    location /rrb {
        proxy_pass http://rrb_radio/health;
    }

    location /hybridcast {
        proxy_pass http://hybridcast/health;
    }
}
