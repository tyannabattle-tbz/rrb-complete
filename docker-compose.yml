version: '3.8'

services:
  # QUMUS Core - Orchestration Engine
  qumus-core:
    build:
      context: .
      dockerfile: Dockerfile.qumus
    container_name: qumus-core
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/qumus
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
    depends_on:
      - mysql
      - redis
    networks:
      - qumus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs/qumus:/app/logs
      - ./data/qumus:/app/data

  # RRB Radio - Port 3001
  rrb-radio:
    build:
      context: .
      dockerfile: Dockerfile.rrb
    container_name: rrb-radio
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/rrb
      QUMUS_API_URL: http://qumus-core:3000
    depends_on:
      - mysql
      - qumus-core
    networks:
      - qumus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs/rrb:/app/logs
      - ./data/rrb:/app/data
      - ./audio:/app/audio

  # HybridCast Emergency Broadcast - Port 3002
  hybridcast:
    build:
      context: .
      dockerfile: Dockerfile.hybridcast
    container_name: hybridcast
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/hybridcast
      QUMUS_API_URL: http://qumus-core:3000
    depends_on:
      - mysql
      - qumus-core
    networks:
      - qumus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs/hybridcast:/app/logs
      - ./data/hybridcast:/app/data

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: qumus-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: qumus
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    networks:
      - qumus-network
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qumus-redis
    ports:
      - "6379:6379"
    networks:
      - qumus-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: qumus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - qumus-core
      - rrb-radio
      - hybridcast
    networks:
      - qumus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backup Service
  backup-service:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: qumus-backup
    environment:
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 2 AM
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: 30
    depends_on:
      - mysql
    networks:
      - qumus-network
    restart: unless-stopped
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/app/backup.sh:ro

networks:
  qumus-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
